services:
  - type: web
    name: faceless
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    plan: starter
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:////var/data/scenesound.db
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
    disk:
      name: scenesound-data
      mountPath: /var/data
      sizeGB: 1
